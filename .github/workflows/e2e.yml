name: Tests (web/)

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/e2e.yml']
  pull_request:
    paths: ['web/**', '.github/workflows/e2e.yml']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14   # pinned (matches the deploy workflow) — "latest" is a flaky lookup
      - name: Install deps
        working-directory: web
        run: bun install --frozen-lockfile
      # unit suite (pure functions: JSON repair, loop-guard, cron, MCP Task projection)
      - name: Unit tests
        working-directory: web
        run: bun test tests/unit
      # E2E: Playwright builds the app (PUBLIC_PATH=/) + serves web/dist, then drives real browsers.
      - name: Install Playwright browsers
        working-directory: web
        run: bunx playwright install --with-deps chromium webkit
      - name: E2E tests
        working-directory: web
        run: bunx playwright test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
